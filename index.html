<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Google 세이프 브라우징 문제 해결 -->
    <meta name="google-site-verification" content="Q5nfMziST5tgsHaAJ7CjpcWxddsXkPrGG76G9H2fJ8g" />
    <title>Animal-Go-Draw</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; text-align: center; background-color: #f0f0f0; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); box-sizing: border-box; width: 100%; }
        .character-selection { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        @media (max-width: 600px) { .character-selection { grid-template-columns: repeat(3, 1fr); } }
        .character-card { background: #ecf0f1; padding: 10px 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; border: 2px solid transparent; }
        .character-card.selected { background: #2ecc71; color: white; border-color: #27ae60; transform: scale(0.95); }
        .character-card.disabled { opacity: 0.6; cursor: not-allowed; }
        .icon-stack { position: relative; width: 30px; height: 30px; margin: 0 auto 5px auto; }
        .animal { position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 2; font-size: 16px; }
        .kart { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1; font-size: 20px; }
        
        .race-track { 
            position: relative; 
            background: #2c3e50; 
            border-radius: 10px; 
            margin: 20px 0; 
            overflow: hidden; 
            width: 100%; 
            box-sizing: border-box; 
        }
        .finish-line {
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            border-right: 10px dashed #fff;
            z-index: 5;
        }
        .racer { 
            position: absolute; 
            transition: left 0.1s linear; 
            z-index: 10;
        }
        
        button { width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer; margin-bottom: 10px; }
        button:disabled { background: #95a5a6; }
        .result { margin-top: 20px; padding: 15px; background: #ffd700; border-radius: 10px; font-weight: bold; }
        .leaderboard { margin-top: 10px; text-align: left; background: #fff; padding: 10px; border-radius: 5px; }
        .leaderboard-item { display: flex; align-items: center; margin-bottom: 5px; }
        .rank-icon { width: 35px; text-align: center; display: inline-block; }
        .animal-name { margin-left: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <audio id="fanfareSound" src="https://www.myinstants.com/media/sounds/undertale-sfx-rare-to-find.mp3" preload="auto"></audio>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script>
        const { useState, createElement: h } = React;

        const ALL_ANIMALS = [
            { id: 'cheetah', name: "치타", icon: "🐆", kart: "🏎️" }, { id: 'rabbit', name: "토끼", icon: "🐇", kart: "🛴" },
            { id: 'penguin', name: "펭귄", icon: "🐧", kart: "🛷" }, { id: 'snail', name: "달팽이", icon: "🐌", kart: "🚜" },
            { id: 'tiger', name: "호랑이", icon: "🐅", kart: "🚀" }, { id: 'elephant', name: "코끼리", icon: "🐘", kart: "🚚" },
            { id: 'fox', name: "여우", icon: "🦊", kart: "🏍️" }, { id: 'monkey', name: "원숭이", icon: "🐒", kart: "🚲" },
            { id: 'bear', name: "곰", icon: "🐻", kart: "🚌" }, { id: 'panda', name: "판다", icon: "🐼", kart: "🛵" }
        ];

        const NUMBER_EMOJIS = ['4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣', '9️⃣', '🔟'];

        const AnimalKartIcon = (animal) => h('div', { className: 'icon-stack' },
            h('span', { className: 'animal' }, animal.icon),
            h('span', { className: 'kart' }, animal.kart)
        );

        function AnimalKartRacerApp() {
            const [selected, setSelected] = useState(ALL_ANIMALS.slice(0, 4).map(a => a.id));
            const [positions, setPositions] = useState({});
            const [isRacing, setIsRacing] = useState(false);
            const [winner, setWinner] = useState(null);
            const [ranked, setRanked] = useState([]);

            const toggleRacer = (id) => {
                if (isRacing) return; 
                if (selected.includes(id)) {
                    if (selected.length <= 2) { alert("최소 2명의 참가자는 남겨야 합니다!"); return; }
                    setSelected(selected.filter(r => r !== id));
                } else {
                    if (selected.length >= 10) { alert("최대 10명의 참가자만 선택할 수 있습니다!"); return; }
                    setSelected([...selected, id]);
                }
                setWinner(null);
            };

            const startRace = () => {
                setIsRacing(true); setWinner(null); setRanked([]);
                
                // 위치 초기화: 시작 시 모든 동물의 위치를 0으로 강제 설정
                const resetPos = {};
                selected.forEach(id => resetPos[id] = 0);
                setPositions(resetPos);

                const speeds = {};
                selected.forEach(id => speeds[id] = Math.random() * 15 + 8);
                
                let time = 0;
                const interval = setInterval(() => {
                    time += 0.1;
                    const newPos = {};
                    selected.forEach(id => newPos[id] = Math.min(time * speeds[id], 98));
                    setPositions(newPos);
                    
                    if (time >= 6 || Object.values(newPos).some(p => p >= 98)) {
                        clearInterval(interval);
                        setIsRacing(false);
                        const sorted = selected.map(id => ({ ...ALL_ANIMALS.find(a => a.id === id), pos: newPos[id] }))
                                               .sort((a, b) => b.pos - a.pos);
                        setWinner(sorted[0]); setRanked(sorted);
                        document.getElementById('fanfareSound').play();
                    }
                }, 100);
            };

            const getRankDisplay = (index) => {
                if (index === 0) return '🥇';
                if (index === 1) return '🥈';
                if (index === 2) return '🥉';
                return NUMBER_EMOJIS[index - 3] || `${index + 1}`;
            };

            return h('div', { className: 'container' },
                h('h1', null, 'Animal-Go-Draw'),
                h('div', { className: 'character-selection' }, ALL_ANIMALS.map(a => 
                    h('div', { 
                        key: a.id, 
                        className: `character-card ${selected.includes(a.id) ? 'selected' : ''} ${isRacing ? 'disabled' : ''}`,
                        onClick: () => toggleRacer(a.id)
                    }, AnimalKartIcon(a), h('div', null, a.name))
                )),
                h('button', { onClick: startRace, disabled: isRacing }, isRacing ? '레이싱 중...' : '레이스 시작'),
                h('div', { className: 'race-track', style: { height: (selected.length * 40) + 'px' } }, 
                    h('div', { className: 'finish-line' }),
                    selected.map((id, i) => 
                        h('div', { key: id, className: 'racer', style: { top: (i * 40 + 5) + 'px', left: (positions[id] || 0) + '%' } }, 
                            AnimalKartIcon(ALL_ANIMALS.find(a => a.id === id))
                        )
                    )
                ),
                winner ? h('div', { className: 'result' }, 
                    h('p', null, `우승자: ${winner.name}!`),
                    h('div', { className: 'leaderboard' }, ranked.map((r, i) => 
                        h('div', { key: r.id, className: 'leaderboard-item' }, 
                            h('span', { className: 'rank-icon' }, getRankDisplay(i)),
                            h('span', { className: 'animal-name' }, r.name)
                        )
                    ))
                ) : null
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(AnimalKartRacerApp));
    </script>
</body>
</html>
